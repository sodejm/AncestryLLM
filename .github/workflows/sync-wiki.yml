name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

# The follow-up clone and publish steps use the job-scoped token.  Keep the
# workflow limited to repository contents and avoid granting unrelated scopes.
permissions:
  contents: write

concurrency:
  group: sync-wiki-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    name: Validate and synchronize wiki
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out documentation source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Publishing is intentionally added by the next workflow increment after
      # authenticated wiki cloning and deterministic mirroring are available.
      - name: Confirm synchronization is not implemented yet
        run: |
          echo "Wiki synchronization skeleton completed; no pages were published."
