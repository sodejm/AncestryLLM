name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

# The follow-up clone and publish steps use the job-scoped token.  Keep the
# workflow limited to repository contents and avoid granting unrelated scopes.
permissions:
  contents: write

concurrency:
  group: sync-wiki-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    name: Validate and synchronize wiki
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out documentation source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Clone initialized wiki repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          wiki_directory="$(mktemp -d "${RUNNER_TEMP}/ancestryllm-wiki.XXXXXX")"
          git_config="$(mktemp "${RUNNER_TEMP}/ancestryllm-git-config.XXXXXX")"
          chmod 600 "$git_config"
          export GIT_CONFIG_GLOBAL="$git_config"

          cleanup_credentials() {
            git config --global --unset-all http.https://github.com/.extraheader || true
            rm -f "$git_config"
          }
          trap cleanup_credentials EXIT

          # Keep credentials in a temporary Git configuration rather than in
          # the clone URL or repository configuration. The configuration is
          # removed immediately after the authenticated clone.
          authorization="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 --wrap=0)"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $authorization"
          git clone --depth=1 https://github.com/sodejm/AncestryLLM.wiki.git "$wiki_directory"
          git config --global --unset-all http.https://github.com/.extraheader

          echo "WIKI_WORKTREE=$wiki_directory" >> "$GITHUB_ENV"

      - name: Mirror validated documentation into the wiki
        run: |
          set -euo pipefail

          python scripts/validate_wiki_docs.py --source docs

          # The wiki is a flat page namespace.  Validation rejects duplicate
          # basenames before this copy, and the source is deliberately limited
          # to Markdown pages (including Home.md and _Sidebar.md).
          find "$WIKI_WORKTREE" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          find docs -type f -name '*.md' -exec cp {} "$WIKI_WORKTREE" \
            \;

      - name: Commit and push wiki changes
        env:
          SOURCE_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "$WIKI_WORKTREE"

          if git diff --quiet; then
            echo "Wiki is already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "docs: synchronize from ${SOURCE_SHA}"
          authorization="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 --wrap=0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $authorization" \
            push origin HEAD:master
