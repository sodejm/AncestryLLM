name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Tests
        run: uv run pytest --verbose --cov --cov-report=term-missing
      - name: Lint and type check
        if: matrix.python == '3.12'
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src/ancestryllm
          ./scripts/check_repository_safety.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Dependency and static analysis
        run: |
          uv run pip-audit
          uvx semgrep scan --error --config p/python --config p/secrets src
      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment --output-file sbom.json .venv/bin/python
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ancestryllm-sbom
          path: sbom.json
          if-no-files-found: error
