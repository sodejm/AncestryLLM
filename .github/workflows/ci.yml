name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Tests
        run: uv run pytest --verbose --cov --cov-report=term-missing
      - name: Lint and type check
        if: matrix.python == '3.12'
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src/ancestryllm
          ./scripts/check_repository_safety.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Dependency and static analysis
        run: |
          uv run pip-audit
          uvx semgrep scan --error --config p/python --config p/secrets src
      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment --output-file sbom.json .venv/bin/python
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ancestryllm-sbom
          path: sbom.json
          if-no-files-found: error
