name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Cache uv downloads and builds
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python }}-
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Tests
        run: uv run pytest --verbose --cov --cov-report=term-missing
      - name: Lint and type check
        if: matrix.python == '3.12'
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src/ancestryllm
          ./scripts/check_repository_safety.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Scan commits for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          version: 3.95.9
          extra_args: --results=verified,unknown --fail-on-scan-errors
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Cache uv downloads and builds
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-3.12-
      - name: Install locked environment
        run: |
          python -m pip install --disable-pip-version-check uv
          uv sync --locked --all-extras
      - name: Dependency and static analysis
        run: |
          uv run pip-audit
          uvx semgrep scan --error --config p/python --config p/secrets src
      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment --output-file sbom.json .venv/bin/python
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ancestryllm-sbom
          path: sbom.json
          if-no-files-found: error
